<div class="ib-appearance">

  <fieldset class="ib-defaults-fieldset">
    <legend>Text</legend>

    <div class="form-group">
      <label>Font</label>
      <select name="font">
        {{#each fontChoices}}
          <option value="{{value}}" {{#if selected}}selected{{/if}}>{{label}}</option>
        {{/each}}
      </select>
    </div>
    <div class="form-group">
      <label>Base Font Size <span class="units">px</span></label>
      <input type="number" name="baseFontSize" value="{{baseFontSize}}" min="8" max="48" step="1">
    </div>

  </fieldset>

  <fieldset class="ib-defaults-fieldset">
    <legend>Colors</legend>

    <div class="form-group">
      <label>Default Note Color</label>
      <select name="defaultNoteColor">
        {{#each noteColorChoices}}
          <option value="{{value}}" {{#if selected}}selected{{/if}}>{{label}}</option>
        {{/each}}
      </select>
    </div>
    <div class="form-group">
      <label>Default Ink Color</label>
      <select name="defaultInkColor">
        {{#each inkColorChoices}}
          <option value="{{value}}" {{#if selected}}selected{{/if}}>{{label}}</option>
        {{/each}}
      </select>
    </div>
    <div class="form-group">
      <label>Pin Color</label>
      <select name="pinColor">
        {{#each pinColorChoices}}
          <option value="{{value}}" {{#if selected}}selected{{/if}}>{{label}}</option>
        {{/each}}
      </select>
    </div>

  </fieldset>

  <fieldset class="ib-defaults-fieldset">
    <legend>Connections</legend>

    <div class="form-group">
      <label>Line Width <span class="units">px</span></label>
      <input type="number" name="connectionLineWidth" value="{{connectionLineWidth}}" min="1" max="30" step="1">
    </div>

  </fieldset>

  <footer class="ib-defaults-footer">
    <button type="button" data-action="save"><i class="fas fa-save"></i> Save</button>
    <button type="button" data-action="cancel"><i class="fas fa-times"></i> Cancel</button>
  </footer>

</div>
